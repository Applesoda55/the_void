<!DOCTYPE html>
<html>
<head>
    <title>THE_VOID_V64_POOL</title>
    <style>
        body { 
            background: #000; color: #600; font-family: 'Georgia', serif; 
            margin: 0; overflow: hidden; height: 100vh; touch-action: none;
            user-select: none; -webkit-user-select: none;
        }

        body.ingame { cursor: none !important; }

        #lantern-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: none;
        }

        #crosshair-container {
            position: fixed; pointer-events: none; z-index: 2000;
            top: 0; left: 0; display: none;
            text-align: center; will-change: transform;
        }

        #crosshair-ring {
            width: 80px; height: 80px;
            box-sizing: border-box;
            border: 9px solid rgba(255, 0, 0, 0.7);
            border-radius: 50%; margin-left: -40px; margin-top: -40px;
        }

        #central-stats {
            margin-top: 20px; color: #f00; font-family: monospace;
            font-weight: bold; text-shadow: 0 0 15px #000; width: 400px; margin-left: -200px;
        }

        #timer-val { font-size: 4.5vw; letter-spacing: 2px; }
        #dread-label { font-size: 3vw; opacity: 0.8; text-transform: uppercase; }

        @media (max-width: 768px) {
            #crosshair-ring { width: 80px; height: 80px; margin-left: -40px; margin-top: -40px; border-width: 3px; }
            #central-stats { width: 300px; margin-left: -150px; background: rgba(0, 0, 0, 0.4); border-radius: 10px; padding: 10px; }
            #timer-val { font-size: 8vw; }
            #dread-label { font-size: 4vw; }
        }

        #loading-container { width: 300px; height: 2px; background: #200; margin-top: 30px; position: relative; overflow: hidden; }
        #loading-bar { width: 0%; height: 100%; background: #800; transition: width 0.2s ease-out; box-shadow: 0 0 10px red; }

        .anomaly {
            position: absolute; width: 140px; height: 140px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="red"><path d="M50 95c-2-10-5-20-10-30-5-10-15-15-20-25s0-20 10-25 15 5 15 15l5 25 5-35c2-15 15-20 20-10s0 20-10 30l-15 40z" opacity="0.8"/></svg>');
            background-size: contain; background-repeat: no-repeat;
            z-index: 200; cursor: pointer; opacity: 0; -webkit-user-drag: none; will-change: opacity, filter;
        }

        .phantom {
            position: fixed; width: 55vh; height: 55vh; pointer-events: none; z-index: 150; opacity: 0;
            background-size: cover; background-position: center; will-change: transform, opacity, filter;
            transition: opacity 0.4s ease-out, transform 1.2s linear;
        }

        #jumpscare {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }

        #scare-img { 
            width: 100%; height: 100%; object-fit: cover; position: absolute; top:0; left:0; z-index: 9998; 
            filter: grayscale(1) contrast(5) brightness(0.8); animation: glitch 0.05s infinite; 
        }

        #final-stats { position: relative; z-index: 10000; color: #fff; text-align: center; background: rgba(0,0,0,0.85); padding: 50px; border: 2px solid red; }

        @keyframes glitch {
            0% { transform: translate(0,0); }
            25% { transform: translate(-5px, 3px); }
            75% { transform: translate(5px, -3px); }
            100% { transform: translate(0,0); }
        }
    </style>
</head>
<body>

    <div id="start-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 id="loc-title" style="color:#800; letter-spacing:15px; font-size:3em; text-align:center; text-transform: uppercase;">MANIFESTING</h1>
        <div id="loading-container">
            <div id="loading-bar"></div>
        </div>
        <button id="start-btn" onclick="handleStart()" style="display:none; margin-top:40px; background:none; border:1px solid #600; color:#b00; padding:20px 50px; cursor:pointer; font-family:serif; letter-spacing:10px; font-weight:bold; text-transform: uppercase;">BEGIN PURGE</button>
    </div>

    <div id="jumpscare" onclick="location.reload()">
        <img id="scare-img" src="">
        <div id="final-stats">
            <h1 style="color:red; margin:0; letter-spacing:15px; font-size:4em;">POSSESSED</h1>
            <p id="survival-display" style="font-size:2em; margin: 30px 0; color: #fff; font-family: monospace;"></p>
            <p id="restart-hint" style="font-size:0.9em; opacity:0; letter-spacing:5px; transition: opacity 0.5s;">CLICK TO TRY AGAIN</p>
        </div>
    </div>
    
    <div id="crosshair-container">
        <div id="crosshair-ring"></div>
        <div id="central-stats">
            <div id="timer-val">00:00.00</div>
            <div id="dread-label">DREAD: <span id="manifest-val">0</span>%</div>
        </div>
    </div>

    <div id="lantern-overlay"></div>

<script>
    let dread = 0, active = false, startTime, audioCtx, timerInterval;
    let targetX = innerWidth/2, targetY = innerHeight/2, lanternX = targetX, lanternY = targetY;
    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    const lowDreadPool = ["https://images.squarespace-cdn.com/content/v1/56c13cc00442627a08632989/1476665191145-11N2DEU750O6CETLU434/IMG_4344.PNG?format=500w", "https://i.pinimg.com/736x/6d/68/cf/6d68cfe3b7984ff61a2ee0d161d78f3c.jpg", "https://i.etsystatic.com/20862972/r/il/fbde38/2054290919/il_794xN.2054290919_jygx.jpg", "https://preview.redd.it/can-we-ever-get-as-creepy-as-vintage-halloween-v0-2yor4mvjjpj71.jpg?width=640&crop=smart&auto=webp&s=03623ea881b168d114390f6803d57e6deb85a823", "https://hips.hearstapps.com/hmg-prod/images/ten-year-old-girl-stands-in-the-corner-of-her-home-with-her-news-photo-1600784321.jpg?crop=1.00xw:0.774xh;0,0.0843xh", "https://media.newyorker.com/photos/5bd78600daf42d0501bd51e6/master/pass/Treisman-Scary-Stories.jpg"];
    const midDreadPool = ["https://i.ebayimg.com/images/g/FVsAAOSwCvRi8VPV/s-l400.jpg", "https://www.gamespot.com/a/uploads/scale_super/1632/16320660/4050752-ss_8f7f15e075b4843726e2e52e0ca10df3b7022aba.1920x1080.jpg", "https://preview.redd.it/what-analog-horror-series-has-the-creepiest-faces-v0-kvsamnnvfw6e1.jpeg?width=948&format=pjpg&auto=webp&s=526dd21d79a53eb60ce3e1743b5cddd3c099542d", "https://i.pinimg.com/474x/40/87/af/4087af0f0b28c2b64d9456c51aa75c4c.jpg"];
    const highDreadPool = ["https://www.thisishorror.co.uk/wp-content/uploads/2012/07/the-exorcist.jpg", "https://images.unsplash.com/photo-1614846409012-68045952f40c?auto=format&fit=crop&w=800&q=80", "https://i.pinimg.com/736x/89/3c/bc/893cbc25aaa02410eb3880fe925af2b0.jpg"];
    const finalJumpscarePool = ["https://images.unsplash.com/photo-1509248961158-e54f6934749c?auto=format&fit=crop&w=800&q=80","https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRS1UOOXuEvUpaLbFrVIVVqw2ZYoXPncJQY1w&s"];

    const preloadedLow = [], preloadedMid = [], preloadedHigh = [], preloadedFinal = [];
    
    // NEW: Image Cycling Decks to prevent duplication
    let decks = { low: [], mid: [], high: [] };

    function getNextFromDeck(type) {
        if (decks[type].length === 0) {
            let source = type === 'low' ? preloadedLow : (type === 'mid' ? preloadedMid : preloadedHigh);
            decks[type] = [...source].sort(() => Math.random() - 0.5);
        }
        return decks[type].pop();
    }

    window.addEventListener('dragstart', e => e.preventDefault());

    async function handleStart() {
        if (isMobile && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') setupOrientationListener();
            } catch (e) { console.error(e); }
        } else if (isMobile) {
            setupOrientationListener();
        }
        startGame();
    }

    function setupOrientationListener() {
        window.addEventListener('deviceorientation', (e) => {
            let normX = (e.gamma + 10) / 30; 
            let normY = (e.beta - 50) / 25; 
            targetX = Math.min(Math.max(normX * window.innerWidth, 0), window.innerWidth);
            targetY = Math.min(Math.max(normY * window.innerHeight, 0), window.innerHeight);
        });
    }

    async function init() {
        try {
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json();
            document.getElementById('loc-title').innerText = `THE ${data.city.toUpperCase()} POSSESSION`;
        } catch (e) { document.getElementById('loc-title').innerText = "THE VOID POSSESSION"; }
        const allToLoad = [{ urls: lowDreadPool, target: preloadedLow }, { urls: midDreadPool, target: preloadedMid }, { urls: highDreadPool, target: preloadedHigh }, { urls: finalJumpscarePool, target: preloadedFinal }];
        let total = lowDreadPool.length + midDreadPool.length + highDreadPool.length + finalJumpscarePool.length;
        let loadedCount = 0;
        const checkComplete = () => {
            loadedCount++;
            document.getElementById('loading-bar').style.width = (loadedCount / total) * 100 + "%";
            if (loadedCount === total) {
                document.getElementById('loading-container').style.display = 'none';
                document.getElementById('start-btn').style.display = 'block';
            }
        };
        allToLoad.forEach(category => {
            category.urls.forEach(url => {
                const img = new Image(); img.src = url;
                img.onload = () => { category.target.push(img); checkComplete(); };
                img.onerror = checkComplete;
            });
        });
    }

    window.addEventListener('mousemove', e => { if(!isMobile) { targetX = e.clientX; targetY = e.clientY; }});

    function playHauntedPiano() {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;
        const baseNote = 150 + (Math.random() * 600);
        [1.0, 1.01].forEach((detune) => {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(baseNote * detune, now);
            gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 1.5);
        });
    }

    function playCroak() {
        if (!active || dread < 5) { setTimeout(playCroak, 1000); return; }
        const intensity = dread / 100; const now = audioCtx.currentTime;
        const bufferSize = audioCtx.sampleRate * 0.04; const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0); for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 300 + (Math.random() * 200); filter.Q.value = 10;
        const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.05 + (intensity * 0.8), now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
        noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        noise.start();
        setTimeout(playCroak, Math.max(40, 450 - (intensity * 400)));
    }

    function playHeartbeat() {
        if (!active) return;
        const intensity = dread / 100; const bpmDelay = Math.max(100, 850 - (dread * 7.5));
        const beat = (offset) => {
            const now = audioCtx.currentTime + offset;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(25 + (intensity * 20), now); osc.frequency.exponentialRampToValueAtTime(5, now + 0.15);
            gain.gain.setValueAtTime(0.5 + (intensity * 2.0), now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.2);
            if (navigator.vibrate) setTimeout(() => navigator.vibrate(12), offset * 1000);
        };
        beat(0); beat(0.12);
        setTimeout(playHeartbeat, bpmDelay);
    }

    function update() {
        if(!active) return;
        lanternX += (targetX - lanternX) * 0.35;
        lanternY += (targetY - lanternY) * 0.35;
        const visionRadius = Math.max(80, 250 - (dread * 1.7));
        document.getElementById('crosshair-container').style.transform = `translate3d(${lanternX}px, ${lanternY}px, 0)`;
        document.getElementById('lantern-overlay').style.background = `radial-gradient(circle ${visionRadius}px at ${lanternX}px ${lanternY}px, transparent 0%, rgba(5,0,0,0.99) 70%, rgba(0,0,0,1) 98%)`;
        
        // --- REFINED PROPORTIONAL PHANTOM LOGIC ---
        let maxPhantoms = dread > 80 ? 3 : (dread > 50 ? 2 : 1);
        let currentPhantoms = document.querySelectorAll('.phantom').length;
        
        let manifestChance = 0.004 + (Math.pow(dread/100, 2) * 0.08);

        if (currentPhantoms < maxPhantoms && Math.random() < manifestChance) {
            const p = document.createElement('div');
            p.className = 'phantom';
            document.body.appendChild(p);

            let poolType = dread < 35 ? 'low' : (dread < 70 ? 'mid' : 'high');
            let img = getNextFromDeck(poolType);
            
            if (img) {
                let startX = (Math.random() * 70 + 15);
                let startY = (Math.random() * 70 + 15);
                p.style.left = startX + "%"; 
                p.style.top = startY + "%";
                p.style.backgroundImage = `url(${img.src})`;
                
                let clarity = dread / 100;
                let blurVal = Math.max(0, 15 - (clarity * 15));
                let brightness = 0.4 + (clarity * 1.2);
                
                let mirror = Math.random() < 0.5 ? -1 : 1;
                let tilt = (Math.random() * 40 - 20);
                
                p.style.filter = `blur(${blurVal}px) grayscale(1) brightness(${brightness}) contrast(1.5)`;
                p.style.transform = `translate(-50%, -50%) scaleX(${mirror}) scale(${0.8 + (clarity * 0.4)}) rotate(${tilt}deg)`;

                // ANIMATION: Drift movement
                requestAnimationFrame(() => {
                    p.style.opacity = 0.3 + (clarity * 0.7);
                    let moveX = (Math.random() - 0.5) * 15;
                    let moveY = (Math.random() - 0.5) * 15;
                    p.style.transform += ` translate(${moveX}vw, ${moveY}vh)`;
                });

                let duration = Math.max(500, 1800 - (dread * 10));
                setTimeout(() => {
                    p.style.opacity = "0";
                    setTimeout(() => p.remove(), 400);
                }, duration);
            }
        }

        document.querySelectorAll('.anomaly').forEach(a => {
            const rect = a.getBoundingClientRect();
            const dist = Math.hypot(lanternX - (rect.left + 70), lanternY - (rect.top + 70));
            if (dist < visionRadius) {
                if(isMobile && dist < visionRadius * 0.3) { 
                    playHauntedPiano(); 
                    if (navigator.vibrate) navigator.vibrate(30);
                    a.remove(); 
                    calculateDread(); 
                }
                a.style.opacity = 1 - (dist / visionRadius);
                a.style.filter = `drop-shadow(0 0 ${5 + (dread/100 * 70)}px red) brightness(${1.0 + (dread/100 * 4)})`;
                a.style.pointerEvents = 'auto';
            } else { a.style.opacity = "0"; a.style.pointerEvents = 'none'; }
        });
        requestAnimationFrame(update);
    }

    function spawnAnomaly() {
        if (!active) return;
        const a = document.createElement('div');
        a.className = 'anomaly';
        a.style.left = (Math.random() * 85 + 5) + "%"; a.style.top = (Math.random() * 85 + 5) + "%";
        a.onmousedown = () => { if (!isMobile && parseFloat(a.style.opacity) > 0.2) { playHauntedPiano(); a.remove(); calculateDread(); } };
        document.body.appendChild(a);
        calculateDread();
    }

    function calculateDread() {
        const count = document.querySelectorAll('.anomaly').length;
        dread = Math.min(100, count * 2.5);
        document.getElementById('manifest-val').innerHTML = Math.floor(dread);
        if (dread >= 100) triggerEnd();
    }

    function triggerEnd() {
        active = false; clearInterval(timerInterval);
        const jumpScreen = document.getElementById('jumpscare');
        if (preloadedFinal.length > 0) document.getElementById('scare-img').src = preloadedFinal[Math.floor(Math.random() * preloadedFinal.length)].src;
        setTimeout(() => { document.getElementById('restart-hint').style.opacity = "0.6"; }, 2000);
        document.getElementById('survival-display').innerText = `POSSESSED - TIME: ${document.getElementById('timer-val').innerText}`;
        jumpScreen.style.display = 'flex';
        document.getElementById('crosshair-container').style.display = 'none';
        const g = audioCtx.createGain(); g.connect(audioCtx.destination); g.gain.setValueAtTime(1.5, audioCtx.currentTime);
        for(let i=0; i<30; i++){
            const o = audioCtx.createOscillator(); o.type = 'sawtooth';
            o.frequency.value = 40 + Math.random() * 600; o.connect(g); o.start(); o.stop(audioCtx.currentTime + 2);
        }
    }

    function startGame() {
        active = true; startTime = Date.now();
        document.body.classList.add('ingame');
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('crosshair-container').style.display = 'block';
        document.getElementById('lantern-overlay').style.display = 'block';
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        timerInterval = setInterval(() => {
            const diff = Date.now() - startTime;
            const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000), ms = Math.floor((diff % 1000) / 10);
            document.getElementById('timer-val').innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
        }, 50);
        update(); playHeartbeat(); playCroak();
        (function loop() { if(active) { spawnAnomaly(); let nextSpawn = Math.max(300, 2000 - (dread * 17)); setTimeout(loop, nextSpawn); } })();
    }
    init();
</script>
</body>
</html>
